<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
    </head>

<body>
    <select id="calc-select">
        <option value="standard">Standard Calculator</option>
        <option value="scientific">Scientific Calculator</option>
        <option value="bitconverter">Hex/ Dec/ Bin Converter</option>
    </select><br>

    <div id="calculators">
        <div id="standard" class="calc-panel active">
            <div class="calculator">
             <button class="history-toggle">History</button>
        <div class="history-panel" id="historyPanel">
            <div class="history-empty" id="historyEmpty">No history yet.</div>
            <button class="history-clear" id="historyClear">Clear History</button>
        </div>

        <div class="display" id="std-display">0</div>
        <div class="buttons">

            <button data-action="clear">AC</button>
            <button data-action="sign">+/-</button>
            <button data-action="percent">%</button>
            <button data-action="operator" data-value="/">÷</button>

            <button data-action="digit" data-value="7">7</button>
            <button data-action="digit" data-value="8">8</button>
            <button data-action="digit" data-value="9">9</button>
            <button data-action="operator" data-value="*">×</button>

            <button data-action="digit" data-value="4">4</button>
            <button data-action="digit" data-value="5">5</button>
            <button data-action="digit" data-value="6">6</button>
            <button data-action="operator" data-value="-">-</button>

            <button data-action="digit" data-value="1">1</button>
            <button data-action="digit" data-value="2">2</button>
            <button data-action="digit" data-value="3">3</button>
            <button data-action="operator" data-value="+">+</button>

            <button data-action="digit" data-value="0">0</button>
            <button data-action="decimal">.</button>
            <button data-action="equals">=</button>
            <button data-action="clearCurrent">C</button>
            
            </div>
        </div>
        </div>
        <div id="scientific" class="calc-panel">
            <div class="calculator">
            <button class="history-toggle">History</button>
        <div class="history-panel" id="sciHistoryPanel">
            <div class="history-empty" id="SciHistoryEmpty">No history yet.</div>
            <button class="history-clear" id="SciHistoryClear">Clear History</button>
        </div>

        <div class="display" id="sci-display">0</div><div class="sci-buttons">  
            <button data-action="scientific" data-value="sin">sin</button>
            <button data-action="scientific" data-value="cos">cos</button>
            <button data-action="scientific" data-value="tan">tan</button>
            <button data-action="scientific" data-value="log">log</button>
            <button data-action="scientific" data-value="ln">ln</button>
            
            <button data-action="scientific" data-value="sqrt">√</button>
            <button data-action="scientific" data-value="square">x²</button>
            <button data-action="scientific" data-value="inv">1/x</button>
            <button data-action="scientific" data-value="pi">π</button>
            <button data-action="scientific" data-value="e">e</button>
          </div>        <div class="buttons">
                      <button data-action="clear">AC</button>
            <button data-action="sign">+/-</button>
            <button data-action="percent">%</button>
            <button data-action="operator" data-value="/">÷</button>

            <button data-action="digit" data-value="7">7</button>
            <button data-action="digit" data-value="8">8</button>
            <button data-action="digit" data-value="9">9</button>
            <button data-action="operator" data-value="*">×</button>

            <button data-action="digit" data-value="4">4</button>
            <button data-action="digit" data-value="5">5</button>
            <button data-action="digit" data-value="6">6</button>
            <button data-action="operator" data-value="-">-</button>

            <button data-action="digit" data-value="1">1</button>
            <button data-action="digit" data-value="2">2</button>
            <button data-action="digit" data-value="3">3</button>
            <button data-action="operator" data-value="+">+</button>

            <button data-action="digit" data-value="0">0</button>
            <button data-action="decimal">.</button>
            <button data-action="equals">=</button>
            <button data-action="clearCurrent">C</button>
            
            </div>
        </div>
        </div>
        <div id="bitconverter" class="calc-panel">
            <div class="calculator">
                <div class = 'converter-row'>
                <label>DEC</label>
                <input type="text" id="dec-input" placeholder="Decimal">
                </div>
                <div class = 'converter-row'>
                <label>BIN</label>
                <input type="text" id="bin-input" placeholder="Binary">
                </div>
                <div class = 'converter-row'>
                <label>HEX</label>
                <input type="text" id="hex-input" placeholder="Hexadecimal">
                </div>
                <div class = 'converter-row'>
                <label>OCT</label>
                <input type="text" id="oct-input" placeholder="Octal">
            </div>
                <button id="conv-clear">Clear</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
   
</html>
